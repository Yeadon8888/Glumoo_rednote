# Railway 部署配置文件
# 用于配置持久化存储和环境变量

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# 不指定 startCommand，使用 Dockerfile 的 CMD
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# 持久化卷配置
# 注意：Railway 的 Volume 配置主要通过 Dashboard 完成
# 此配置文件仅作为文档说明
#
# 需要在 Railway Dashboard 中手动添加两个 Volume：
# 1. Mount Path: /app/history (用于保存历史记录)
# 2. Mount Path: /app/output  (用于保存生成的图片)
