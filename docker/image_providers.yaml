# 图片生成服务配置
#
# 部署说明：
# 1. 本地 Docker: 挂载包含 API Key 的 image_providers.yaml 文件
# 2. Railway 等云平台: 设置环境变量 GOOGLE_API_KEY 或 GEMINI_API_KEY
# 3. Web 界面: 在"系统设置"页面配置 API Key
#
active_provider: gemini

providers:
  # Google Gemini 图片生成
  gemini:
    type: google_genai
    api_key: ""  # 留空，从环境变量 GOOGLE_API_KEY 读取
    model: gemini-3-pro-image-preview
    high_concurrency: false  # 是否启用高并发，GCP 300$ 试用账号不建议启用

