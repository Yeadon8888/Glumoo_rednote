# 图片生成服务配置
#
# 部署说明：
# 1. 本地 Docker: 挂载包含 API Key 的 image_providers.yaml 文件
# 2. Railway 等云平台: 设置环境变量 GOOGLE_API_KEY 或 GEMINI_API_KEY
# 3. Web 界面: 在"系统设置"页面配置 API Key
#
active_provider: tokensfactory_gpt_image

providers:
  # TokensFactory synchronous GPT Image 2 series API
  tokensfactory_gpt_image:
    type: image_api
    api_key_env: TOKENSFACTORY_API_KEY
    base_url: https://tokensfactory.cc/v1
    endpoint_type: /v1/images/generations
    edit_endpoint: /v1/images/edits
    model: gpt-image-2-plus
    default_aspect_ratio: "3:4"
    image_size: 2048x2048
    output_size: 1536x2048
    quality: low
    response_format: url
    output_format: png
    high_concurrency: true
    max_concurrent: 5
    min_free_storage_mb: 96
    orphan_grace_seconds: 600
    create_retry_count: 4
    create_retry_base_delay: 12
