# 文本生成服务配置
#
# 部署说明：
# 1. 本地 Docker: 挂载包含 API Key 的 text_providers.yaml 文件
# 2. Railway 等云平台: 设置环境变量 GOOGLE_API_KEY 或 GEMINI_API_KEY
# 3. Web 界面: 在"系统设置"页面配置 API Key
#
active_provider: tokensfactory

providers:
  # TokensFactory OpenAI-compatible text API
  tokensfactory:
    type: openai_compatible
    api_key_env: TOKENSFACTORY_API_KEY
    base_url: https://tokensfactory.cc/v1
    endpoint_type: /v1/chat/completions
    model: gemini-3.5-flash
    temperature: 0.7
    max_output_tokens: 8000
