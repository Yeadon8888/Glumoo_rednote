services:
  glumoo:
    build: .
    container_name: glumoo-pet-agent
    ports:
      - "12398:12398"
    volumes:
      # 持久化数据目录
      - ./history:/app/history
      - ./output:/app/output
      # 挂载预设的模型配置文件（包含 API Key）
      - ./text_providers.yaml:/app/text_providers.yaml
      - ./image_providers.yaml:/app/image_providers.yaml
    restart: unless-stopped
